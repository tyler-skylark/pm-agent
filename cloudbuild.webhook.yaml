steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -f
      - Dockerfile.webhook
      - -t
      - us-central1-docker.pkg.dev/skylark-pm-agents/pm-agent/webhook:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/skylark-pm-agents/pm-agent/webhook:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/skylark-pm-agents/pm-agent/webhook

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - pm-agent-webhook
      - --image=us-central1-docker.pkg.dev/skylark-pm-agents/pm-agent/webhook:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed

images:
  - us-central1-docker.pkg.dev/skylark-pm-agents/pm-agent/webhook:$COMMIT_SHA
  - us-central1-docker.pkg.dev/skylark-pm-agents/pm-agent/webhook:latest

options:
  logging: CLOUD_LOGGING_ONLY
